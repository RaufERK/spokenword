# Оптимизированная RTMP конфигурация для nginx
# Для стабильного стриминга на мобильных и десктопах

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        # Увеличиваем буферы для стабильности
        max_message 64M;
        buflen 5s;
        
        application live {
            live on;
            
            # HLS настройки - оптимизированы для мобильных
            hls on;
            hls_path /srv/streaming/live;
            hls_fragment 2s;               # Короткие фрагменты для быстрого старта
            hls_playlist_length 60s;        # Достаточно длинный плейлист
            hls_continuous on;              # Непрерывная нумерация
            hls_cleanup on;                 # Автоочистка старых сегментов
            hls_nested off;                 # Файлы в корне папки
            hls_sync 100ms;                 # Синхронизация времени
            
            # Варианты качества для адаптивного стриминга
            hls_variant _low BANDWIDTH=400000,RESOLUTION=426x240;
            hls_variant _mid BANDWIDTH=800000,RESOLUTION=854x480;
            hls_variant _high BANDWIDTH=1500000,RESOLUTION=1280x720;
            
            # Архивирование (отключено для тестирования)
            # record all;
            # record_path /srv/streaming/archive;
            # record_suffix .flv;
            # record_unique on;
            
            # Настройки для стабильности
            drop_idle_publisher 0;          # Не отключать пустой поток
            idle_streams off;               # Не закрывать неактивные потоки
            sync 300ms;                     # Синхронизация A/V
            interleave on;                  # Чередование аудио/видео
            wait_key on;                    # Ждать ключевой кадр
            wait_video on;                  # Ждать видео перед началом
            publish_notify on;              # Уведомления о публикации
            
            # GOP размер (группа изображений)
            gop_cache on;                   # Кэш GOP для быстрого подключения
            
            # Настройки задержки
            play_restart on;                # Перезапуск воспроизведения
            
            # Буферизация
            allow publish 127.0.0.1;        # Разрешаем локальную публикацию
            allow publish all;              # Разрешаем публикацию всем
            
            # Дополнительно для стабильности
            meta copy;                      # Копировать метаданные
        }
        
        application live_backup {
            live on;
            
            # Резервный поток с базовыми настройками
            hls on;
            hls_path /srv/streaming/live_backup;
            hls_fragment 4s;                # Длиннее фрагменты
            hls_playlist_length 120s;       # Длиннее плейлист
            hls_continuous off;
            hls_cleanup on;
            hls_nested off;
            
            drop_idle_publisher 0;
            idle_streams off;
        }
    }
}
