worker_processes auto;
user www-data;

error_log /var/log/nginx/error_rtmp.log info;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name www.spoken-word.ru spoken-word.ru;

        location /live/ {
            alias /srv/streaming/live/;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
        }

        location /archive/ {
            alias /srv/streaming/archive/;
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        location / {
            proxy_pass http://127.0.0.1:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;

            # запускаем скрипт ТОЛЬКО при появлении паблишера
            # exec_publish /usr/local/bin/start-hls.sh $app $name;

	    # стартуем службу с именем ключа
		exec_publish      sudo /bin/systemctl start hls-worker@${name}.service;
		exec_publish_done sudo /bin/systemctl stop  hls-worker@${name}.service;

            drop_idle_publisher 15s;
        }
    }
}

