# Добавить в nginx.conf в блок rtmp -> application live

application live {
    live on;
    
    # HLS для видео (остаётся как есть)
    hls on;
    hls_path /srv/streaming/live;
    hls_fragment 2s;
    hls_playlist_length 60s;
    hls_continuous on;
    hls_cleanup on;
    hls_nested off;
    hls_sync 100ms;
    hls_type live;
    
    # Запуск Icecast для аудио при старте стрима
    exec_publish /usr/local/bin/start-icecast-audio.sh $name;
    exec_publish_done /usr/local/bin/stop-icecast-audio.sh $name;
    
    drop_idle_publisher 0;
    idle_streams off;
    sync 300ms;
    interleave on;
}

