# Добавить в nginx виртуальный хост spoken-word.ru

# Proxy для Icecast аудио-стрима
location /audio-stream/ {
    proxy_pass http://127.0.0.1:8000/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_buffering off;
    proxy_cache off;
    
    # CORS заголовки для кросс-доменных запросов
    add_header Access-Control-Allow-Origin *;
    add_header Access-Control-Allow-Methods "GET, OPTIONS";
    add_header Access-Control-Allow-Headers "Range, Content-Type";
    add_header Access-Control-Expose-Headers "Content-Length, Content-Range";
    
    # Заголовки для стриминга
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# Статистика Icecast (опционально, для админки)
location /icecast-admin/ {
    proxy_pass http://127.0.0.1:8000/admin/;
    proxy_set_header Host $host;
    
    # Ограничение доступа (только для админов)
    allow 127.0.0.1;
    deny all;
}

