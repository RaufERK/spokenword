worker_processes auto;
user www-data;

error_log /var/log/nginx/spoken_word_error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

# HTTP/HTTPS конфигурация
http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Логирование
    access_log /var/log/nginx/spoken_word_access.log;

    # Основной сервер
    server {
        listen 80;
        server_name spoken-word.ru www.spoken-word.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name spoken-word.ru www.spoken-word.ru;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/private.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # HLS потоки
        location /live/ {
            alias /srv/streaming/live/;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "Range";
            
            # Обработка OPTIONS запросов для CORS
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Allow-Headers "Range";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain charset=UTF-8";
                add_header Content-Length 0;
                return 204;
            }
            
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            proxy_buffering off;
        }

        # Архивные файлы
        location /archive/ {
            alias /srv/streaming/archive/;
            add_header Cache-Control "no-cache";
            add_header Access-Control-Allow-Origin "*";
        }

        # Основное приложение
        location / {
            proxy_pass         http://127.0.0.1:3005;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400;
        }
    }

    # Статистика RTMP (опционально)
    server {
        listen 8080;
        server_name localhost;
        
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }
        
        location /stat.xsl {
            root /var/www/html/rtmp;
        }
    }
}

# RTMP конфигурация
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        # Основное приложение для стримов
        application live {
            live on;
            
            # Запуск HLS конвертации при начале стрима
            exec_publish      sudo /bin/systemctl start hls-worker@${name}.service;
            exec_publish_done sudo /bin/systemctl stop  hls-worker@${name}.service;
            
            # Запуск архивирования
            exec_publish      sudo /bin/systemctl start stream-archive@${name}.service;
            exec_publish_done sudo /bin/systemctl stop  stream-archive@${name}.service;
            
            # Таймауты
            drop_idle_publisher 15s;
            idle_streams off;
            
            # Запись в архив
            record all;
            record_path /srv/streaming/archive;
            record_suffix .flv;
            record_unique on;
        }

        # Приложение для конференций
        application conf {
            live on;
            
            exec_publish      sudo /bin/systemctl start hls-conf@${name}.service;
            exec_publish_done sudo /bin/systemctl stop  hls-conf@${name}.service;
            
            drop_idle_publisher 15s;
            idle_streams off;
        }
    }
}
