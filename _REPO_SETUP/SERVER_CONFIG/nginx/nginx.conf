user www-data;
worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    ##
    # Basic Settings
    ##
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 100M;
    
    # Оптимизация буферов для стриминга
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    output_buffers 1 32k;
    postpone_output 1460;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ##
    # SSL Settings
    ##
    ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    ##
    # Logging Settings
    ##
    access_log /var/log/nginx/access.log;

    ##
    # Gzip Settings
    ##
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml text/x-js text/x-cross-domain-policy application/x-font-ttf application/x-font-opentype application/vnd.ms-fontobject image/x-icon;

    ##
    # Virtual Host Configs
    ##
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}

# RTMP Configuration

# RTMP Configuration

# RTMP Configuration

# RTMP Configuration  
rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        
        application live {
            live on;
            
            # Встроенный HLS с правильными параметрами для мобильных
            hls on;
            hls_path /srv/streaming/live;
            hls_fragment 2s;
            hls_playlist_length 12s;
            hls_continuous on;
            hls_cleanup on;
            hls_nested on;
            
            # Форварды
            exec_publish /usr/local/bin/start-forwards.sh $name;
            exec_publish /usr/local/bin/start-icecast-audio.sh $name;
            exec_publish_done /usr/local/bin/stop-forwards.sh $name;
            exec_publish_done /usr/local/bin/stop-icecast-audio.sh $name;
            
            drop_idle_publisher 0;
            sync 300ms;
            interleave on;
            wait_key on;
            wait_video on;
            
            allow publish all;
            allow play all;
            meta copy;
        }
    }
}
