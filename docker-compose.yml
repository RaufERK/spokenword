services:
  postgres:
    image: postgres:16-alpine
    container_name: spokenword-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: spokenword
      POSTGRES_USER: spokenword
      POSTGRES_PASSWORD: spokenword_dev
    ports:
      - "5432:5432"
    volumes:
      - spokenword_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spokenword"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  spokenword_pg_data:
