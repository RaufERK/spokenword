listen              1935;
max_connections     2000;

daemon              off;
srs_log_tank        console;
pid                 /run/srs/srs.pid;

http_api {
    enabled         on;
    listen          127.0.0.1:1985;
}

http_server {
    enabled         off;
    listen          127.0.0.1:8080;
    dir             /usr/local/srs/objs/nginx/html;
}

rtc_server {
    enabled         on;
    listen          8000;
    candidate       ;
}

vhost __defaultVhost__ {
    hls {
        enabled         off;
    }

    rtc {
        enabled     on;
        rtc_to_rtmp off;
    }

    transcode {
        enabled     on;
        ffmpeg      /usr/local/bin/ffmpeg;
        engine low360 {
            enabled         on;
            vcodec          libx264;
            vprofile        baseline;
            vpreset         veryfast;
            vfps            30;
            vbitrate        700;
            vwidth          640;
            vheight         360;
            acodec          aac;
            abitrate        96;
            asample_rate    44100;
            achannels       2;
            # КРИТИЧНО: Форсируем keyint для стабильных 2-секундных сегментов
            vparams         g=60:keyint=60:min-keyint=30;
            output          rtmp://127.0.0.1:[port]/[app]/[stream]_360?vhost=transcoded;
        }
    }

    play {
        gop_cache   on;
    }
}

vhost spoken-word.ru {
    refer __defaultVhost__;
}

vhost stream.spoken-word.ru {
    refer __defaultVhost__;
}

vhost transcoded {
    hls {
        enabled         on;
        hls_path        /var/lib/srs/hls;
        hls_fragment    2;
        hls_window      6;
        hls_cleanup     on;
        hls_dispose     3;
        hls_wait_keyframe on;
        hls_m3u8_file   [app]/main.m3u8;
        hls_ts_file     [app]/main-[seq].ts;
    }

    play {
        gop_cache   on;
    }
}

